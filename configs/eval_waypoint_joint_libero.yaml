# Waypoint Joint VLA evaluation config — LIBERO
# Usage: python -m openpi.waypoint.eval_libero --config configs/eval_waypoint_joint_libero.yaml
#
# Uses a single joint checkpoint (shared backbone) instead of separate VLM + AE checkpoints.
# Saves ~50% VRAM compared to loading two separate models.

robot_type: libero
task_suite: libero_10

# Joint model checkpoint (single checkpoint with shared backbone)
# When "joint_checkpoint" is present, eval_libero auto-detects joint mode.
# For LoRA-trained models, use the merged checkpoint (model_merged.safetensors):
#   the training script auto-exports it alongside lora.safetensors.
#   eval loads model_merged.safetensors or model.safetensors from this dir.
joint_checkpoint: /workspace/openpi/checkpoints/waypoint_joint_libero_10_lora_sg_0.3_5090_4gpu/7000

# Data / normalization
dataset_statistics_path: /workspace/data/dataset_statistics.json

# Model dimensions
model_action_dim: 32
model_proprio_dim: 32
horizon_steps: 32
num_waypoints: 7
vlm_max_token_len: 256
ae_max_token_len: 64

# Model architecture
paligemma_variant: gemma_2b
action_expert_variant: gemma_300m
precision: bfloat16

# Normalization
norm_type: q99

# Inference optimization
torch_compile: true

# Center crop — inference equivalent of training's RandomResizedCrop.
# Enable when the model was trained with image_aug: true + RandomResizedCrop.
# center_crop_scale should match training's fixed area ratio (0.9),
# aligned with VLA-Adapter's random_resized_crop scale=[0.9, 0.9].
center_crop: true
center_crop_scale: 0.9

# Evaluation
num_trials_per_task: 3
num_steps_wait: 10

# Reproducibility: set eval_seed to fix flow matching noise for deterministic actions.
# Remove or comment out to disable (non-deterministic, default behavior).
eval_seed: 7
# Bit-exact reproducibility: disable Flash/MemEfficient SDPA (~70% slower AE inference).
# Only needed if you require bit-identical outputs across runs.
# With eval_seed alone, actions are already functionally identical —
# only the lowest bits differ due to CUDA float reduction order.
# deterministic_sdpa: true

# Video output
video_out_path: /workspace/openpi/checkpoints/waypoint_joint_libero_10_lora_sg_0.3_5090_4gpu/7000/eval_libero_videos
