# Waypoint Joint VLA evaluation config — LIBERO
# Usage: python -m openpi.waypoint.eval_libero --config configs/eval_waypoint_joint_libero.yaml
#
# Uses a single joint checkpoint (shared backbone) instead of separate VLM + AE checkpoints.
# Saves ~50% VRAM compared to loading two separate models.

robot_type: libero
task_suite: libero_10

# Joint model checkpoint (single checkpoint with shared backbone)
# When "joint_checkpoint" is present, eval_libero auto-detects joint mode.
joint_checkpoint: /projects/chuanlia001/checkpoints/libero_10_lora/700_best

# Data / normalization
dataset_statistics_path: /projects/chuanlia001ssd/data/libero/10/dataset_statistics.json

# Model dimensions
model_action_dim: 32
model_proprio_dim: 32
horizon_steps: 32
num_waypoints: 7
vlm_max_token_len: 256
ae_max_token_len: 64

# Model architecture
paligemma_variant: gemma_2b
action_expert_variant: gemma_300m
precision: bfloat16

# Normalization
norm_type: q99

# Inference optimization
torch_compile: true

# Center crop — inference equivalent of training's RandomResizedCrop.
# Enable when the model was trained with image_aug: true + RandomResizedCrop.
# center_crop_scale should match training's fixed area ratio (0.9),
# aligned with VLA-Adapter's random_resized_crop scale=[0.9, 0.9].
center_crop: true
center_crop_scale: 0.9

# Evaluation
num_trials_per_task: 3
num_steps_wait: 10

# Closed-loop improvements (eval-only, no retraining needed)
# max_segments_per_replan: execute only N waypoint segments before replanning
#   with fresh observation. 0 = execute all 7 (original behavior).
#   Recommended: 3 (replan every ~18 steps instead of ~42).
max_segments_per_replan: 3
# use_actual_proprio: use the actual robot proprioception as start_wp for
#   the next AE segment, instead of the VLM-predicted end_wp.
#   Prevents error accumulation between consecutive waypoint pairs.
use_actual_proprio: true

# Video output
video_out_path: data/libero/videos_wp_joint_libero_10_lora
