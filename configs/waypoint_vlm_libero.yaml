# Waypoint VLM training config — LIBERO
# Usage: torchrun --standalone --nnodes=1 --nproc_per_node=2 scripts/train_waypoint.py --mode vlm --config configs/waypoint_vlm_libero.yaml

robot_type: libero

# --- Data paths ---
wp_rlds_dir: /workspace/data/libero_10_wp_0006/waypoint_filtered_rlds__libero/1.0.0
dataset_statistics_path: /workspace/data/dataset_statistics.json

# --- Model architecture ---
paligemma_variant: gemma_2b
action_expert_variant: gemma_300m  # Only needed for weight extraction
precision: bfloat16

# Waypoint config
num_waypoints: 7
max_token_len: 256
stride: 1

# Pretrained weights (Pi0.5 base — will extract PaliGemma portion)
pretrained_weight_path: /workspace/model/pi05_base_pytorch

# Training hyperparameters
batch_size: 20
num_train_steps: 10000
warmup_steps: 1000
peak_lr: 1.0e-4
end_lr: 1.0e-5

# Normalization
norm_type: q99

# Image augmentation — aligned with joint config (VLA-Adapter style)
image_aug: true
image_aug_cfg:
  random_resized_crop_scale: [0.9, 0.9]
  brightness: 0.2
  contrast: [0.8, 1.2]
  saturation: [0.8, 1.2]
  hue: 0.05

# Shuffle
shuffle_buffer_size: 5000
# Episode-level shuffle (for multi-suite training, 0 = disabled)
episode_shuffle_buffer_size: 0

# Data prefetching
prefetch: true

# Logging and checkpointing
exp_name: waypoint_vlm_libero
checkpoint_dir: checkpoints/{exp_name}
save_interval: 500
log_interval: 20
wandb_enabled: true
wandb_project: waypoint_e2e

# LoRA (set to true for parameter-efficient fine-tuning)
lora_enabled: true
lora_rank: 16
lora_alpha: 16.0
lora_init: "gaussian"              # true/"kaiming" (default) or "gaussian"
lora_dropout: 0.0
# lora_use_rslora: false
lora_apply_to: backbone_only      # "all" | "backbone_only" | "expert_only"
vision_encoder_mode: lora          # "freeze" (default) | "lora" | "full"

# LoRA skip-list / trainable-list (uncomment to override defaults)
# lora_modules_to_skip:
#   - action_in_proj
#   - action_out_proj
#   - proprio_encoder
#   - time_mlp_in
#   - time_mlp_out
#   - multi_modal_projector
#   - lm_head
# lora_trainable_modules:
#   - action_in_proj
#   - action_out_proj
#   - proprio_encoder
#   - time_mlp_in
#   - time_mlp_out
#   - multi_modal_projector

# Resume from checkpoint
resume: false
