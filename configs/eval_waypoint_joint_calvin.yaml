# Waypoint Joint VLA evaluation config — CALVIN (ABC_D split)
# Usage: python -m openpi.waypoint.eval_calvin --config configs/eval_waypoint_joint_calvin.yaml
#
# Uses a single joint checkpoint (shared backbone) instead of separate VLM + AE checkpoints.
# Evaluates with CALVIN's chain-task protocol: 1000 sequences of 5 subtasks each.

robot_type: calvin

# Joint model checkpoint (single checkpoint with shared backbone)
# When "joint_checkpoint" is present, eval_calvin auto-detects joint mode.
joint_checkpoint: /path/to/joint/checkpoint

# Data / normalization
dataset_statistics_path: /workspace/calvin_abc_wp_001/norm_stats

# Model dimensions
model_action_dim: 32
model_proprio_dim: 32
horizon_steps: 32
num_waypoints: 7
vlm_max_token_len: 256
ae_max_token_len: 64

# Model architecture
paligemma_variant: gemma_2b
action_expert_variant: gemma_300m
precision: bfloat16

# Normalization
norm_type: q99

# Inference optimization
torch_compile: true

# Center crop — inference equivalent of training's RandomResizedCrop.
# Enable when the model was trained with image_aug: true + RandomResizedCrop.
center_crop: true
center_crop_scale: 0.9

# CALVIN eval settings
calvin_dataset_path: calvin/dataset/task_ABC_D
num_sequences: 1000
ep_len: 360

# Video output
video_out_path: data/calvin/videos_wp_joint
