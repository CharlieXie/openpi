# Waypoint Joint (VLM + AE) training config — LIBERO
# Usage: torchrun --standalone --nnodes=1 --nproc_per_node=2 scripts/train_waypoint_joint.py --config configs/waypoint_joint_libero.yaml

robot_type: libero

# --- Data paths ---
# AE data
original_rlds_dir: /workspace/data/libero_10_no_noops/1.0.0
wp_indices_path: /workspace/data/libero_10_wp_0006/waypoint_indices.json
# VLM data
wp_rlds_dir: /workspace/data/libero_10_wp_0006/waypoint_filtered_rlds__libero/1.0.0
# Shared
dataset_statistics_path: /workspace/openpi/data/dataset_statistics.json

# --- Model architecture ---
paligemma_variant: gemma_2b
action_expert_variant: gemma_300m
precision: bfloat16

# Model dimensions (AE)
model_action_dim: 32
model_proprio_dim: 32
horizon_steps: 32
max_duration: 32
ae_max_token_len: 64

# Waypoint config (VLM)
num_waypoints: 7
vlm_max_token_len: 256
stride: 1

# Pretrained weights — LoRA-merged checkpoint (base + step-800 LoRA)
pretrained_weight_path: /workspace/model/merged_libero_10_800

# --- Joint training ---
gradient_strategy: scale_gradient       # "none" | "stop_gradient" | "scale_gradient" | "freeze_backbone"
gradient_scale: 0.3                     # only used when gradient_strategy=scale_gradient (fraction of AE gradient flowing into backbone K/V)
ae_loss_weight: 1.0

# Batch sizes (per GPU)
vlm_batch_size: 280
ae_batch_size: 280

# Training hyperparameters
num_train_steps: 1500
warmup_steps: 40
peak_lr: 2.0e-4
end_lr: 1.0e-7

# Normalization
norm_type: q99

# Image augmentation — shared by VLM and AE (aligned with VLA-Adapter)
# Both branches use the same torchvision RandomResizedCrop + ColorJitter pipeline,
# applied in their respective datasets (CPU / PIL level).
image_aug: true
image_aug_cfg:
  random_resized_crop_scale: [0.9, 0.9]   # fixed 0.9 area ratio (matches VLA-Adapter)
  brightness: 0.2
  contrast: [0.8, 1.2]
  saturation: [0.8, 1.2]
  hue: 0.05

# Shuffle buffers
vlm_shuffle_buffer_size: 5000
ae_shuffle_buffer_size: 1000

# Logging and checkpointing
exp_name: waypoint_joint_libero_10_lora_sg_0.3_t1
checkpoint_dir: checkpoints/{exp_name}
save_interval: 100
log_interval: 4
wandb_enabled: true
wandb_project: waypoint_e2e

# LoRA (set to true for parameter-efficient fine-tuning)
lora_enabled: true
lora_rank: 16
lora_alpha: 16.0
lora_init: "gaussian"              # true/"kaiming" (default) or "gaussian"
lora_dropout: 0.0
# lora_use_rslora: false
lora_apply_to: all           # "all" | "backbone_only" | "expert_only"
vision_encoder_mode: lora  # "freeze" (default) | "lora" | "full"
# train_vision_encoder: true      # (legacy) maps to vision_encoder_mode if not set

# LoRA skip-list: these nn.Linear modules are NOT wrapped with LoRA.
# They are either full-trained or frozen, controlled by lora_trainable_modules.
# By default, embed_tokens (nn.Embedding) gets LoRA via LoRAEmbedding.
# To disable embed_tokens LoRA (full-train instead), add "embed_tokens" to both
# lora_modules_to_skip and lora_trainable_modules below (+4.2GB optimizer memory).
# (Uncomment to override defaults — most users don't need to change these)
# lora_modules_to_skip:
#   - action_in_proj
#   - action_out_proj
#   - proprio_encoder
#   - time_mlp_in
#   - time_mlp_out
#   - multi_modal_projector
#   - lm_head                   # tied with embed_tokens, logits via LoRAEmbedding
#   # - embed_tokens            # uncomment to disable LoRAEmbedding → full-train

# LoRA trainable list: among skipped modules, which ones stay trainable?
# Modules in skip-list but NOT here → frozen.
# (Uncomment to override defaults)
# lora_trainable_modules:
#   - action_in_proj
#   - action_out_proj
#   - proprio_encoder
#   - time_mlp_in
#   - time_mlp_out
#   - multi_modal_projector
#   # - embed_tokens            # uncomment if embed_tokens is in skip-list above

# Resume from checkpoint
resume: false
