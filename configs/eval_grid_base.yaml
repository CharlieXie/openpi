# Grid evaluation base config — LIBERO Spatial
# Used by run_grid_eval.py; checkpoint paths are overridden via CLI args.

robot_type: libero
task_suite: libero_spatial

# Placeholder paths (always overridden by --vlm-checkpoint / --ae-checkpoint)
vlm_checkpoint: /workspace/openpi/checkpoints/waypoint_vlm_libero_spatial_t11/1400
ae_checkpoint: /workspace/openpi/checkpoints/waypoint_ae_libero_spatial_03/1300

# Data / normalization
dataset_statistics_path: /workspace/data/dataset_statistics.json

# Model dimensions
model_action_dim: 32
model_proprio_dim: 32
horizon_steps: 32
num_waypoints: 7
max_token_len: 256

# Model architecture
paligemma_variant: gemma_2b
action_expert_variant: gemma_300m
precision: bfloat16

# Normalization
norm_type: q99

# Inference optimization
vlm_precision: bfloat16
torch_compile: true

# Evaluation
num_trials_per_task: 3
num_steps_wait: 10

# Video output (overridden per job by --video-out-path)
video_out_path: data/libero/videos_grid
