# Waypoint Joint (VLM + AE) training config — CALVIN (ABC_D split)
# Usage: torchrun --standalone --nnodes=1 --nproc_per_node=2 scripts/train_waypoint_joint.py --config configs/waypoint_joint_calvin.yaml

robot_type: calvin

# --- Data paths ---
# AE data
original_rlds_dir: /projects/chuanlia001ssd/data/train/calvin_abc_rlds
wp_indices_path: /projects/chuanlia001ssd/data/train/calvin_abc_wp_0_01/waypoint_indices.json
# VLM data
wp_rlds_dir: /projects/chuanlia001ssd/data/train/calvin_abc_wp_0_01/calvin_abc_wp/1.0.0
# Shared
dataset_statistics_path: /projects/chuanlia001ssd/data/train/dataset_statistics.json

# --- Model architecture ---
paligemma_variant: gemma_2b
action_expert_variant: gemma_300m
precision: bfloat16

# Model dimensions (AE)
model_action_dim: 32
model_proprio_dim: 32
horizon_steps: 32
max_duration: 32
ae_max_token_len: 64

# Waypoint config (VLM)
num_waypoints: 7
vlm_max_token_len: 256
stride: 1

# Pretrained weights (Pi0.5 base)
pretrained_weight_path: /projects/chuanlia001ssd/model/pi05_base_pytorch

# --- Joint training ---
gradient_strategy: scale_gradient       # "none" | "stop_gradient" | "scale_gradient" | "freeze_backbone"
gradient_scale: 0.3                     # only used when gradient_strategy=scale_gradient (fraction of AE gradient flowing into backbone K/V)
ae_loss_weight: 1.0

# Batch sizes (per GPU)
vlm_batch_size: 192
ae_batch_size: 192

# Training hyperparameters
num_train_steps: 4000
lr_schedule: multistep
# warmup_steps: 40
# peak_lr: 4.0e-5
# num_steps_before_decay: [300, 600, 900, 1200, 1500, 1800, 2100, 2400]
# lr_decay_gamma: 0.5

peak_lr: 2.0e-4
warmup_steps: 100
num_steps_before_decay:  [2200, 3000, 3600]
lr_decay_gamma: 0.3


# Normalization
norm_type: q99

# Image augmentation — shared by VLM and AE (aligned with VLA-Adapter)
# Both branches use the same torchvision RandomResizedCrop + ColorJitter pipeline,
# applied in their respective datasets (CPU / PIL level).
image_aug: true
image_aug_cfg:
  random_resized_crop_scale: [0.9, 1.0]
  brightness: 0.2
  contrast: [0.8, 1.2]
  saturation: [0.8, 1.2]
  hue: 0.05

# Shuffle buffers (Calvin: ~153K VLM samples, ~153K AE pairs, 17870 episodes)
# Reduced from 20K to 10K to avoid CPU RAM OOM on shared nodes (pro6000-4 has 387 GiB shared across 4 GPUs)
vlm_shuffle_buffer_size: 12000
ae_shuffle_buffer_size: 1000
episode_shuffle_buffer_size: 1500

# Logging and checkpointing
exp_name: waypoint_joint_calvin_sg_0.3_wp001
checkpoint_dir: /projects/chuanlia001/checkpoints/{exp_name}
save_interval: 200
log_interval: 4
wandb_enabled: true
wandb_project: waypoint_e2e

# LoRA (set to true for low-memory training)
lora_enabled: false
lora_rank: 16
lora_alpha: 16.0
train_vision_encoder: true

# Resume from checkpoint
resume: true
